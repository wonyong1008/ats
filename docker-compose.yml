services:
  mysql:
    image: mysql:8.0
    container_name: ainjob-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: ainjob_ats
      MYSQL_USER: ainjob
      MYSQL_PASSWORD: ainjob1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
